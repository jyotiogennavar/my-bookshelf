      // ── Flat illustration palette (OKLCH) ────────────────────────────────────────
      // A curated, varied palette. Each book draws an entry based on its series seed
      // + index within the series, so series feel related but books are never identical.
      const COLORS = [
        { l: 68, c: 0.16, h: 22 },    // coral
        { l: 74, c: 0.14, h: 48 },    // peach
        { l: 78, c: 0.13, h: 78 },    // mustard
        { l: 82, c: 0.14, h: 95 },    // butter
        { l: 74, c: 0.16, h: 125 },   // lime
        { l: 66, c: 0.14, h: 145 },   // sage
        { l: 54, c: 0.14, h: 162 },   // forest
        { l: 62, c: 0.11, h: 188 },   // teal
        { l: 56, c: 0.12, h: 215 },   // ocean
        { l: 60, c: 0.14, h: 238 },   // sky
        { l: 48, c: 0.15, h: 258 },   // cobalt
        { l: 42, c: 0.15, h: 280 },   // indigo
        { l: 54, c: 0.17, h: 305 },   // violet
        { l: 62, c: 0.15, h: 330 },   // rose
        { l: 68, c: 0.17, h: 352 },   // raspberry
        { l: 58, c: 0.18, h: 12 },    // crimson
        { l: 72, c: 0.10, h: 62 },    // tan
        { l: 48, c: 0.08, h: 52 },    // cocoa
        { l: 76, c: 0.09, h: 158 },   // mint
        { l: 80, c: 0.11, h: 32 },    // apricot
        { l: 44, c: 0.06, h: 210 },   // slate
        { l: 70, c: 0.13, h: 108 },   // pear
        { l: 56, c: 0.13, h: 30 },    // terracotta
      ];

      function okl(c, dl = 0) {
        const l = Math.max(8, Math.min(96, c.l + dl));
        return `oklch(${l}% ${c.c} ${c.h})`;
      }

      // Simple hash so the same series always starts at the same palette slot.
      function hashSeries(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++)
          h = (h * 31 + s.charCodeAt(i)) >>> 0;
        return h;
      }

      // Track per-series index so adjacent books in a series shift through palette.
      const seriesCounters = {};
      function getPalForBook(seriesLabel) {
        const key = seriesLabel
          .replace(/ #[\d.]+.*/, "")
          .replace(/ Prequel.*/, "")
          .replace(/ Novella.*/, "")
          .replace(/ Companion.*/, "")
          .trim();
        if (seriesCounters[key] === undefined) seriesCounters[key] = 0;
        const idx = seriesCounters[key]++;
        const seriesSeed = hashSeries(key);
        // Each book in a series jumps 7 palette slots from the prior one for variety.
        const palIdx = (seriesSeed + idx * 7) % COLORS.length;
        const base = COLORS[palIdx];
        // Accent: same hue, darker (or lighter on dark bases) for band contrast.
        const accent = okl(base, base.l < 55 ? +18 : -22);
        // Text: readable on the base — dark on light bases, cream on dark bases.
        const text = base.l < 58
          ? `oklch(96% 0.025 ${base.h})`
          : `oklch(20% 0.04 ${base.h})`;
        // Edge: darker version for the flat outline that gives 2D illustration feel.
        const edge = okl(base, -26);
        return { bg: okl(base), accent, text, edge };
      }

          w: 32,
          h: 179,
        },
        {
          title: "The Name of This Book Is Secret",
          series: "The Secret Series #1",
          w: 28,
          h: 176,
        },
        {
          title: "If You're Reading This, It's Too Late",
          series: "The Secret Series #2",
          w: 32,
          h: 178,
        },
        {
          title: "This Book Is Not Good for You",
          series: "The Secret Series #3",
          w: 31,
          h: 177,
        },
        {
          title: "This Isn't What It Looks Like",
          series: "The Secret Series #4",
          w: 30,
          h: 176,
        },
        {
          title: "You Have to Stop This",
          series: "The Secret Series #5",
          w: 28,
          h: 175,
        },
        { title: "Bad Magic", series: "The Secret Series #6", w: 25, h: 172 },
      ];

      // ── Decorative shelf objects (from /images) ──────────────────────────────────
      const SHELF_DECO_IMAGES = [
        "images/plant-svgrepo-1.svg",
        "images/snow-globe-svgrepo-com.svg",
        "images/earth-globe-planet-svgrepo-com.svg",
        "images/plant-svgrepo-2.svg",
      ];

      // ── Stack topper images (placed on top of horizontal book stacks) ────────────
      const STACK_TOPPERS = [
        { src: "images/plant-svgrepo-1.svg", cls: "plant-1" },
        { src: "images/plant-svgrepo-2.svg", cls: "plant-2" },
        { src: "images/snow-globe-svgrepo-com.svg", cls: "snow-globe" },
        { src: "images/earth-globe-planet-svgrepo-com.svg", cls: "earth-globe" },
      ];

      // ── Layout helpers ────────────────────────────────────────────────────────────
      function buildShelfItems(books) {
        const items = [];
        let i = 0,
          stackCounter = 0,
          decoCounter = 0;
        const STACK_EVERY = 19;
        const STACK_SIZES = [3, 2, 4, 3, 2, 3];
        // Place bookends at start of rows (handled per-row) and decos every ~35 books
        const DECO_EVERY = 35;

        while (i < books.length) {
          if (stackCounter >= STACK_EVERY && i + 2 <= books.length) {
            const size =
              STACK_SIZES[Math.floor(i / STACK_EVERY) % STACK_SIZES.length];
            items.push({ type: "stack", books: books.slice(i, i + size) });
            i += size;
            stackCounter = 0;
          } else {
            if (stackCounter > 0 && stackCounter % DECO_EVERY === 0) {
              items.push({
                type: "deco",
                which: decoCounter++ % SHELF_DECO_IMAGES.length,
              });
            }
            items.push({ type: "upright", book: books[i] });
            i++;
            stackCounter++;
          }
        }
        return items;
      }

      // Row widths: keep every row full so there are no visible empty gaps.
      const ROW_WIDTHS = [1200, 1200, 1200, 1200, 1200, 1200, 1200, 1200];
      let rowWidthIdx = 0;

      function buildRows(items) {
        const rows = [];
        let row = [],
          rowW = 0;
        let currentMax = ROW_WIDTHS[rowWidthIdx % ROW_WIDTHS.length];

        for (const item of items) {
          let itemW;
          if (item.type === "upright") itemW = item.book.w + 2;
          else if (item.type === "stack")
            itemW = Math.max(...item.books.map((b) => b.h)) + 4;
          else if (item.type === "deco") itemW = 94;
          else itemW = 30;

          if (rowW + itemW > currentMax && row.length > 0) {
            rows.push(row);
            row = [];
            rowW = 0;
            rowWidthIdx++;
            currentMax = ROW_WIDTHS[rowWidthIdx % ROW_WIDTHS.length];
          }
          row.push(item);
          rowW += itemW;
        }
        if (row.length) rows.push(row);
        // If the last row is only a few items, join them onto the row above
        // so we don't have a sparse bottom shelf.
        if (rows.length > 1 && rows[rows.length - 1].length <= 3) {
          const tail = rows.pop();
          rows[rows.length - 1] = rows[rows.length - 1].concat(tail);
        }
        return rows;
      }

      // ── Deterministic jitter so plain-colored books still vary in size ───────────
      // A tiny hash of the title picks a factor from each array. Applied BEFORE
      // layout packing so rows pack correctly around the new sizes.
      const W_FACTORS = [1.0, 1.18, 0.82, 1.26, 0.88, 1.08, 0.94, 1.35];
      const H_FACTORS = [1.0, 0.92, 1.12, 0.86, 1.18, 0.96, 1.08, 0.9];
      function jitterBook(b, i) {
        let h = 0;
        for (let k = 0; k < b.title.length; k++)
          h = (h * 31 + b.title.charCodeAt(k)) >>> 0;
        const wf = W_FACTORS[(h + i) % W_FACTORS.length];
        const hf = H_FACTORS[(h + i * 3) % H_FACTORS.length];
        return {
          ...b,
          w: Math.max(18, Math.round(b.w * wf)),
          h: Math.max(140, Math.round(b.h * hf)),
        };
      }
      const JITTERED_BOOKS = ALL_BOOKS.map(jitterBook);

      // Spine label: font mix + optional border (deterministic, ~30% with a frame)
      function spineLabelStyle(bd) {
        let h = 0;
        const s = bd.title + "\0" + bd.series;
        for (let k = 0; k < s.length; k++)
          h = (h * 31 + s.charCodeAt(k)) >>> 0;
        const fontClass = "spine-combo-" + (h % 6);
        const r = h % 10;
        let borderClass = "";
        if (r === 7 || r === 8) borderClass = "spine-title--border-single";
        else if (r === 9) borderClass = "spine-title--border-double";
        return { fontClass, borderClass };
      }

      // ── Render ────────────────────────────────────────────────────────────────────
      let globalIdx = 0;
      let stackIdx = 0;

      function makeUprightBook(bd) {
        globalIdx++;
        const pal = getPalForBook(bd.series);
        const spine = spineLabelStyle(bd);

        const el = document.createElement("div");
        el.className = "book";
        el.title = `${bd.title} — ${bd.series}`;
        el.style.cssText =
          `width:${bd.w}px;height:${bd.h}px;` +
          `background:${pal.bg};` +
          `color:${pal.text};`;

        const title = document.createElement("span");
        title.className = ["book-title-spine", spine.fontClass, spine.borderClass]
          .filter(Boolean)
          .join(" ");
        title.textContent = bd.title;
        el.appendChild(title);
        return el;
      }

      function makeStackCluster(books) {
        const cluster = document.createElement("div");
        cluster.className = "stack-cluster";
        const clusterW = Math.max(...books.map((b) => b.h));
        cluster.style.width = clusterW + "px";

        // Topper image on top of the horizontal stack.
        const topper = STACK_TOPPERS[stackIdx++ % STACK_TOPPERS.length];
        const img = document.createElement("img");
        img.src = topper.src;
        img.alt = "";
        img.className = `stack-topper ${topper.cls}`;
        cluster.appendChild(img);

        books.forEach((bd) => {
          globalIdx++;
          const pal = getPalForBook(bd.series);
          const flat = document.createElement("div");
          flat.className = "book-flat";
          flat.title = `${bd.title} — ${bd.series}`;
          flat.style.cssText =
            `width:${bd.h}px;height:${bd.w}px;` +
            `background:${pal.bg};` +
            `color:${pal.text};`;
          const t = document.createElement("span");
          t.className = "book-flat-title";
          t.textContent = bd.title;
          flat.appendChild(t);
          cluster.appendChild(flat);
        });
        return cluster;
      }

      function makeDeco(which) {
        const div = document.createElement("div");
        div.className = "shelf-deco";
        const img = document.createElement("img");
        img.src = SHELF_DECO_IMAGES[which % SHELF_DECO_IMAGES.length];
        img.alt = "";
        div.appendChild(img);
        return div;
      }

      const shelfItems = buildShelfItems(JITTERED_BOOKS);
      const rows = buildRows(shelfItems);
      const bookcase = document.getElementById("bookcase");

      rows.forEach((rowItems) => {
        const rowDiv = document.createElement("div");
        rowDiv.className = "shelf-row";
        const booksDiv = document.createElement("div");
        booksDiv.className = "books";

        rowItems.forEach((item) => {
          if (item.type === "upright")
            booksDiv.appendChild(makeUprightBook(item.book));
          else if (item.type === "stack")
            booksDiv.appendChild(makeStackCluster(item.books));
          else if (item.type === "deco")
            booksDiv.appendChild(makeDeco(item.which));
        });

        rowDiv.appendChild(booksDiv);
        bookcase.appendChild(rowDiv);

        const plank = document.createElement("div");
        plank.className = "shelf-plank";
        bookcase.appendChild(plank);
      });

      // ── Stats section ─────────────────────────────────────────────────────────────
      document.getElementById("total-count").textContent = ALL_BOOKS.length;

      const seriesMap = {};
      ALL_BOOKS.forEach((b) => {
        const key = b.series
          .replace(/ #[\d.]+.*/, "")
          .replace(/ Prequel.*/, "")
          .replace(/ Novella.*/, "")
          .replace(/ Companion.*/, "")
          .trim();
        seriesMap[key] = (seriesMap[key] || 0) + 1;
      });
      document.getElementById("series-count").textContent =
        Object.keys(seriesMap).length;

      // ── Staggered fade-in on load (no hover animation anymore) ───────────────────
      document.querySelectorAll(".book, .book-flat").forEach((el, i) => {
        el.style.opacity = "0";
        el.style.transition = "opacity 0.4s ease";
        setTimeout(() => {
          el.style.opacity = "1";
        }, 40 + i * 6);
      });
    </script>
  </body>
</html>
